AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Notes API using Lambda, API Gateway, and DynamoDB

Globals:
  Function:
    Timeout: 10
    Runtime: python3.14

Resources:

  NotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Notes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  CreateNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: notes_function/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Notes
      Environment:
        Variables:
          TABLE_NAME: Notes
      Events:
        CreateNoteApi:
          Type: Api
          Properties:
            Path: /notes
            Method: post

  GetNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: get_note/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: Notes
      Environment:
        Variables:
          TABLE_NAME: Notes
      Events:
        GetNoteApi:
          Type: Api
          Properties:
            Path: /notes/{id}
            Method: get

  UpdateNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: update_note/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Notes
      Environment:
        Variables:
          TABLE_NAME: Notes
      Events:
        UpdateNoteApi:
          Type: Api
          Properties:
            Path: /notes/{id}
            Method: put

  DeleteNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: delete_note/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Notes
      Environment:
        Variables:
          TABLE_NAME: Notes
      Events:
        DeleteNoteApi:
          Type: Api
          Properties:
            Path: /notes/{id}
            Method: delete

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"